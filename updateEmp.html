<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Employee</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <div class="form-container">
        <form id="updateEmp">
            <label>Employee ID (Read-only)</label>
            <input type="text" id="empid" readonly>

            <label>Employee Name</label>
            <input type="text" id="empname" required>

            <label>Employee MailId</label>
            <input type="text" id="empmailid" required>

            <label>Department Name</label>
            <input type="text" id="department" required>
            <input type="hidden" id="deptId">

            <label>Role</label>
            <input type="text" id="role" required>

            <button type="submit">Update Employee</button>
        </form>
    </div>

<script>
window.onload = function() {
    const emp = JSON.parse(localStorage.getItem("editEmp"));
    if (emp) {
        document.getElementById("empid").value = emp.empid;
        document.getElementById("empname").value = emp.empName;
        document.getElementById("empmailid").value = emp.empMailid;
        document.getElementById("role").value = emp.role;
        // Correctly handle the department object display
        document.getElementById("department").value = emp.department ? emp.department.depname : "";
    }
};

document.getElementById("updateEmp").addEventListener("submit", function(e) {
    e.preventDefault();

    const empid = document.getElementById("empid").value;
    const token = localStorage.getItem("token");

    const updatedData = {
        empName: document.getElementById("empname").value,
        empMailid: document.getElementById("empmailid").value,
        role: document.getElementById("role").value,
        department: { 
            depname: document.getElementById("department").value 
        }
    };

    fetch(`https://login-employeemanagement-3.onrender.com/employee/update/${empid}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token // Ensure there is a space after Bearer
        },
        body: JSON.stringify(updatedData)
    })
    .then(res => {
        if (res.status === 403) {
            throw new Error("403: Check if your user is an ADMIN in the database.");
        }
        return res.text();
    })
    .then(data => {
        alert("✅ " + data);
        localStorage.removeItem("editEmp");
        window.location.href = "viewEmp.html";
    })
    .catch(err => {
        console.error(err);
        alert(err.message);
    });
});
</script>
</body>
</html>
