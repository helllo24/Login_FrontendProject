<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Employee</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <div class="form-container">
        <form id="updateEmp">
            <label>Employee ID (Read-only)</label>
            <input type="text" id="empid" readonly>

            <label>Employee Name</label>
            <input type="text" id="empname" required>

            <label>Employee MailId</label>
            <input type="text" id="empmailid" required>

            <label>Department Name (Read-only)</label>
            <input type="text" id="deptName" readonly>
            <input type="hidden" id="deptId">

            <label>Role</label>
            <input type="text" id="role" required>

            <button type="submit">Update Employee</button>
        </form>
    </div>

<script>
    window.onload = function() {
        const emp = JSON.parse(localStorage.getItem("editEmp"));

        if (emp) {
            document.getElementById("empid").value = emp.empid;
            document.getElementById("empname").value = emp.empName;
            document.getElementById("empmailid").value = emp.empMailid;
            document.getElementById("role").value = emp.role;

            // Map the nested department object to the name field and hidden ID field
            if (emp.department) {
                document.getElementById("deptName").value = emp.department.depname;
                document.getElementById("deptId").value = emp.department.id;
            }
        } else {
            alert("No employee data found.");
            window.location.href = "viewEmp.html";
        }
    };

    document.getElementById("updateEmp").addEventListener("submit", function(e) {
        e.preventDefault();

        const empid = document.getElementById("empid").value;
        const token = localStorage.getItem("token");

        // Prepare data exactly as your Java EmpDto expects it
        const updatedData = {
            empName: document.getElementById("empname").value,
            empMailid: document.getElementById("empmailid").value,
            role: document.getElementById("role").value,
            departmentId: parseInt(document.getElementById("deptId").value)
        };

        fetch(`https://login-employeemanagement-3.onrender.com/employee/update/${empid}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify(updatedData)
        })
        .then(res => {
            if (res.status === 403) {
                throw new Error("403 Forbidden: Ensure your user has ROLE_ADMIN in the database.");
            }
            return res.text();
        })
        .then(data => {
            alert("Success: Employee updated!");
            localStorage.removeItem("editEmp");
            window.location.href = "viewEmp.html";
        })
        .catch(err => {
            console.error(err);
            alert("Update Failed: " + err.message);
        });
    });
</script>
</body>
</html>
