<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADD EMPLOYEE</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <div class="form-container">
        <form id="addEmp">
            <label>Employee Name</label>
            <input type="text" id="empname" required>
            
            <label>Employee MailId</label>
            <input type="text" id="empmailid" required>
            
            <label>Department</label>
            <select id="department" required>
                <option value="">--Select Department--</option>
            </select>
            
            <label>Role</label>
            <input type="text" id="role" required>
            
            <button type="submit">Add Employee</button>
            <button type="reset">Reset</button>
        </form>
        <button onclick="BacktoDash()">Back</button>
    </div>
    <p id="msg"></p>

<script>
    function loadDepartments() {
        const token = localStorage.getItem("token"); 

        if (!token) {
            document.getElementById("msg").innerText = "⚠️ No token found. Please login again.";
            return;
        }

        console.log("Fetching departments with token:", token);

        fetch("https://login-employeemanagement-3.onrender.com/depart/getDepart", {
            method: "GET",
            headers: {
                "Authorization": "Bearer " + token,
                "Content-Type": "application/json"
            }
        })
        .then(res => {
            if (res.status === 403) {
                throw new Error("403 Forbidden: Your token is invalid or you don't have Admin permissions.");
            }
            if (!res.ok) throw new Error("Server Error: " + res.status);
            return res.json();
        })
        .then(res => {
            // Some backends wrap the list in a 'data' property
            const deptlist = res.data || res; 
            const select = document.getElementById("department");
            select.innerHTML = '<option value="">-- Select Department --</option>';

            if (deptlist && Array.isArray(deptlist)) {
                deptlist.forEach(dep => {
                    console.log("Mapping department:", dep);
                    const option = document.createElement("option");
                    option.value = dep.id;
                    // Using 'depname' as defined in your DepartmentEntity.java
                    option.textContent = dep.depname || "Unnamed Department"; 
                    select.appendChild(option);
                });
            } else {
                console.error("Department list is not an array:", deptlist);
            }
        })
        .catch(err => {
            console.error("Load Error:", err);
            document.getElementById("msg").innerText = "❌ " + err.message;
        });
    }

    window.onload = loadDepartments;

    document.getElementById("addEmp").addEventListener("submit", function(e) {
        e.preventDefault();
        const token = localStorage.getItem("token");

        const data = {
            empName: document.getElementById("empname").value,
            empMailid: document.getElementById("empmailid").value,
            departmentId: document.getElementById("department").value,
            role: document.getElementById("role").value
        };

        fetch("https://login-employeemanagement-3.onrender.com/employee/saveEmp", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify(data)
        })
        .then(response => {
            if (!response.ok) throw new Error("Failed to add employee (Status: " + response.status + ")");
            return response.text();
        })
        .then(result => {
            document.getElementById("msg").style.color = "green";
            document.getElementById("msg").innerText = "✅ " + result;
            document.getElementById("addEmp").reset();
        })
        .catch(error => {
            console.error("Submit Error:", error);
            document.getElementById("msg").style.color = "red";
            document.getElementById("msg").innerText = "❌ Error: " + error.message;
        });
    });
    function BacktoDash(){
    window.location.href="admin-dashboard.html";
}
</script>
</body>
</html>
