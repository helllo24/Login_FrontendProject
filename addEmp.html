<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADD EMPLOYEE</title>

    <link rel="stylesheet" href="common.css">
</head>
<body>
    <div class="form-container">
<form id="addEmp">
    <label>Employee Name</label>
    <input type ="text" id="empname" required>
    <label>Employee MailId</label>
    <input type ="text" id="empmailid" required>
    <label>department</label>
    <select id="department" required>
        <option value="">--Select Department</option>
    </select>
    <label>Role</label>
    <input type ="text" id="role" required>
    
      <button type="submit" >AddEmployee</button>
      <button type="reset" >Reset</button>
</form>
</div>
      <p id="msg" ></p>
</body>
<script>
    // Function to load departments into the dropdown
    function loadDepartments() {
        const token = localStorage.getItem("token"); 

        if (!token) {
            document.getElementById("msg").innerText = "⚠️ Please login first.";
            return;
        }

        fetch("https://login-employeemanagement-3.onrender.com/depart/getDepart", {
            method: "GET",
            headers: {
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
            }
        })
        .then(res => {
            if (!res.ok) throw new Error("Status: " + res.status);
            return res.json();
        })
        .then(res => {
            const deptlist = res.data || res; // Handles different response formats
            const select = document.getElementById("department");
            select.innerHTML = '<option value="">-- Select Department --</option>';

            if (deptlist && Array.isArray(deptlist)) {
                deptlist.forEach(dep => {
                    console.log("Current Department Object:", dep);
                    const option = document.createElement("option");
                    option.value = dep.id;
                    option.textContent = dep.depname; // Matches your Java Entity 'depname'
                    select.appendChild(option);
                });
            }
        })
        .catch(err => {
            console.error("Load Error:", err);
        });
    }

    // Run load function when page opens
    window.onload = loadDepartments;

    // Handle Form Submission
    document.getElementById("addEmp").addEventListener("submit", function(e) {
        e.preventDefault();

        const data = {
            empName: document.getElementById("empname").value,
            empMailid: document.getElementById("empmailid").value,
            departmentId: document.getElementById("department").value,
            role: document.getElementById("role").value
        };

        fetch("https://login-employeemanagement-3.onrender.com/employee/saveEmp", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + localStorage.getItem("token")
            },
            body: JSON.stringify(data)
        })
        .then(response => {
            if (!response.ok) throw new Error("Failed to add employee");
            return response.text();
        })
        .then(data => {
            document.getElementById("msg").style.color = "green";
            document.getElementById("msg").innerText = "✅ " + data;
            document.getElementById("addEmp").reset();
            loadDepartments(); // Refresh list if needed
        })
        .catch(error => {
            document.getElementById("msg").style.color = "red";
            document.getElementById("msg").innerText = "❌ Error adding employee";
        });
    });
</script>
</html>
