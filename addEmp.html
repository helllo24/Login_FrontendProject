<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADD EMPLOYEE</title>

    <link rel="stylesheet" href="common.css">
</head>
<body>
    <div class="form-container">
<form id="addEmp">
    <label>Employee Name</label>
    <input type ="text" id="empname" required>
    <label>Employee MailId</label>
    <input type ="text" id="empmailid" required>
    <label>department</label>
    <select id="department" required>
        <option value="">--Select Department</option>
    </select>
    <label>Role</label>
    <input type ="text" id="role" required>
    
      <button type="submit" >AddEmployee</button>
      <button type="reset" >Reset</button>
</form>
</div>
      <p id="msg" ></p>
</body>
<script>
    function loadDepartments() {
    // 1. Get the token from localStorage
    const token = localStorage.getItem("token"); 

    if (!token) {
        console.error("No token found. Please login.");
        return;
    }

    fetch("https://login-employeemanagement-3.onrender.com/depart/getDepart", {
        method: "GET",
        headers: {
            "Authorization": `Bearer ${token}`, // Ensure space after 'Bearer'
            "Content-Type": "application/json"
        }
    })
    .then(res => {
        if (!res.ok) {
            // If this triggers, check your SecurityConfig ROLE permissions
            throw new Error("HTTP error! status: " + res.status);
        }
        return res.json();
    })
    .then(res => {
        // Your backend returns a Response object with a .data field
        const deptlist = res.data; 
        const select = document.getElementById("department");

        // Clear existing options except the placeholder
        select.innerHTML = '<option value="">-- Select Department --</option>';

        if (deptlist && Array.isArray(deptlist)) {
            deptlist.forEach(dep => {
                const option = document.createElement("option");
                option.value = dep.id;
                
                // IMPORTANT: This must match 'depname' from your Java Entity
                option.textContent = dep.depname; 
                
                select.appendChild(option);
            });
        }
    })
    .catch(err => {
        console.error("Error loading departments:", err);
        document.getElementById("msg").innerText = "Failed to load departments. Check console.";
    });
}
   // ✅ CALL ON PAGE LOAD
    window.onload = function () {
        loadDepartments();
    };


document.getElementById("addEmp").addEventListener("submit", function(e) {

    e.preventDefault();

    const empname = document.getElementById("empname").value;
    const empmailid = document.getElementById("empmailid").value;
    const departmentId = document.getElementById("department").value;
    const role = document.getElementById("role").value;

    fetch("https://login-employeemanagement-3.onrender.com/employee/saveEmp", {

        method: "POST",

        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("token")
        },

        body: JSON.stringify({
            empName: empname,
            empMailid: empmailid,
            departmentId: departmentId,  // ✅ MUST
            role: role
        })

    })
    .then(response => {
        if (!response.ok) {
            throw new Error("Failed to add employee");
        }
        return response.text();
    })
    .then(data => {
        document.getElementById("msg").innerText = data;
        document.getElementById("addEmp").reset();
    })
    .catch(error => {
        console.error(error);
        document.getElementById("msg").innerText = "Error adding employee";
    });

});


</script>
</html>
