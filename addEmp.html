<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADD EMPLOYEE</title>

    <link rel="stylesheet" href="common.css">
</head>
<body>
    <div class="form-container">
<form id="addEmp">
    <label>Employee Name</label>
    <input type ="text" id="empname" required>
    <label>Employee MailId</label>
    <input type ="text" id="empmailid" required>
    <label>department</label>
    <input type ="text" id="department" required>
    <label>Role</label>
    <input type ="text" id="role" required>
    
      <button type="submit" >AddEmployee</button>
      <button type="reset" >Reset</button>
</form>
</div>
      <p id="msg" ></p>
</body>
<script>

document.getElementById("addEmp").addEventListener("submit", function(e) {

    e.preventDefault();

    const empname = document.getElementById("empname").value;
    const empmailid = document.getElementById("empmailid").value;
    const department = document.getElementById("department").value;
    const role = document.getElementById("role").value;

    fetch("https://login-employeemanagement-3.onrender.com/employee/saveEmp", {

        method: "POST",

        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("token")
        },

        body: JSON.stringify({
            empName: empname,
            empMailid: empmailid,
            department: department,
            role: role
        })

    })
    .then(response => {
        if (!response.ok) {
            throw new Error("Failed to add employee");
        }
        return response.text();
    })
    .then(data => {

        // ✅ message show
        document.getElementById("msg").innerText = data;

        // ✅ reset ONLY after success
        document.getElementById("addEmp").reset();

    })
    .catch(error => {
        console.error(error);
        document.getElementById("msg").innerText = "Error adding employee";
    });

});

</script>
</html>
