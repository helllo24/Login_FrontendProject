
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enter OTP</title>

<link rel="stylesheet" href="common.css">

<style>

/* OTP boxes */

.otp-container{

display:flex;
justify-content:center;
gap:10px;
margin-top:15px;

}

.otp-container input{

width:40px;
height:45px;

text-align:center;

font-size:20px;

border:1px solid #ccc;
border-radius:5px;

}

</style>

</head>

<body>

<div class="form-container">

<h2>Enter OTP</h2>

<p style="text-align:center;font-size:14px;margin-bottom:10px;">
Enter the 6 digit OTP sent to your account
</p>

<form id="otpverifyform" autocomplete="off">
 
<div class="otp-container">

<input type="text" maxlength="1" class="otp-box" inputmode="numeric" autofocus>
<input type="text" maxlength="1" class="otp-box" inputmode="numeric">
<input type="text" maxlength="1" class="otp-box" inputmode="numeric">
<input type="text" maxlength="1" class="otp-box" inputmode="numeric">
<input type="text" maxlength="1" class="otp-box" inputmode="numeric">
<input type="text" maxlength="1" class="otp-box" inputmode="numeric">

</div>

<button type="submit">Verify OTP</button>

</form>

<p id="msg"></p>

</div>

<script src="otp.js"></script>

</body>
</html>
