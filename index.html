<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div id="login-box" class="card">
            <h2>Sign In</h2>
            <input type="email" id="login-email" placeholder="Email Address" required>
            <button id="btn-request-otp">Send OTP</button>
            
            <div id="otp-section" style="display: none; margin-top: 15px;">
                <input type="text" id="login-otp" placeholder="Enter 6-digit OTP">
                <button id="btn-verify-otp">Verify & Login</button>
            </div>
            <p>New user? <a href="#" onclick="toggleAuth()">Register here</a></p>
        </div>

        <div id="register-box" class="card" style="display: none;">
            <h2>Register Employee</h2>
            <input type="text" id="reg-firstname" placeholder="First Name">
            <input type="text" id="reg-lastname" placeholder="Last Name">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="text" id="reg-designation" placeholder="Designation">
            <button id="btn-register">Create Account</button>
            <p>Already have an account? <a href="#" onclick="toggleAuth()">Login</a></p>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
