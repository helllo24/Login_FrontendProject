<!DOCTYPE html>
<html>
<head>
    <title>Employee List</title>
    <link rel="stylesheet" href="common.css">
</head>

<body>
 
<div class="table-box">
<h2>Employee List</h2>
   <input type="text" id="searchbox"   style="width: 200px; height: 30px;  background-color: bisque;"  ><br>
<button onclick="searchBtn()" style="width: 200px; height: 35px;  background-color: bisque;" >search</button  > 
<table border="1">
<thead>
<tr>
<th>empId</th>
<th>empName</th>
<th>empMailId</th>
<th>department</th>
<th>role</th>
<th>Action</th>
</tr>
</thead>

<tbody id="empTablebody"></tbody>
</table>
<button onclick="BacktoDash()">Back</button>
</div>

<script>
// 🔥 load employees
function loadEmployees() {
    fetch("https://login-employeemanagement-3.onrender.com/employee/findAll", {
        method: "GET",
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    })
    .then(res => res.json())
    .then(data => {
        // Handle potential wrapper objects (e.g., if backend sends { data: [...] })
        const empList = data.data || data; 
        displayEmployess(empList);
    })
    .catch(err => {
        console.error("Fetch Error:", err);
    });
}

// 🔥 display table
function displayEmployess(employeeList) {
    const tablebody = document.getElementById("empTablebody");
    tablebody.innerHTML = "";

    if (!Array.isArray(employeeList)) {
        console.error("Expected an array but received:", employeeList);
        return;
    }

    employeeList.forEach(emp => {
        // FIX: Access the name inside the department object
        // We use a check (emp.department ?) to prevent errors if department is null
        const deptName = emp.department ? emp.department.depname : "No Dept";

        const row = `
        <tr>
            <td>${emp.empid}</td>
            <td>${emp.empName}</td>
            <td>${emp.empMailid}</td>
            <td>${deptName}</td> 
            <td>${emp.role}</td>
            <td> 
                <button onclick="editemp(${emp.empid})">Edit</button>
                <button onclick="delemp(${emp.empid})">Delete</button>
            </td>
        </tr>
        `;

        tablebody.innerHTML += row;
    });
}

// 🔥 edit
function editemp(empid) {
    if (!confirm("Are you sure you want to edit this employee?")) return;

    fetch(`https://login-employeemanagement-3.onrender.com/employee/findId/${empid}`, {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    })
    .then(res => res.json())
    .then(emp => {
        localStorage.setItem("editEmp", JSON.stringify(emp));
        window.location.href = "updateEmp.html";
    });
}

// 🔥 delete
function delemp(empid) {
    if (!confirm("Are you sure you want to delete?")) return;

    fetch(`https://login-employeemanagement-3.onrender.com/employee/del_emp/${empid}`, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        loadEmployees(); 
    });
}

function BacktoDash(){
    window.location.href="admin-dashboard.html";
}
function searchBtn(){

    const value = document.getElementById("searchBox").value;

    fetch(`https://login-employeemanagement-3.onrender.com/employee/mail?empName=${value}`, {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    })
    .then(res => res.json())
    .then(data => {

        console.log(data);

        // 🔥 IMPORTANT FIX
        const empList = data.content || data; 

        displayEmployess(empList);

    })
    .catch(error => console.error("Error:", error));
}

// 🔥 initial load
loadEmployees();
</script>
</body>
</html>
